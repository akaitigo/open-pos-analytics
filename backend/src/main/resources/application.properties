quarkus.http.port=8080
# CORS は環境変数で制御（localhost ハードコード禁止）
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:5173}
# 分析DB（dev/test は Quarkus Dev Services が PostgreSQL コンテナを自動起動。prod は環境変数必須）
quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.jdbc.url=${DATABASE_URL}
%prod.quarkus.datasource.username=${DB_USER}
%prod.quarkus.datasource.password=${DB_PASSWORD}
# スキーマの正は Flyway（Hibernate による DDL 生成はしない）
quarkus.flyway.migrate-at-start=true
quarkus.hibernate-orm.schema-management.strategy=none
# 会員IDハッシュ用ソルト（ADR-0003）。prod ではデフォルト無し = 未設定なら起動失敗
analytics.customer-salt=${ANALYTICS_CUSTOMER_SALT:dev-only-salt}
%prod.analytics.customer-salt=${ANALYTICS_CUSTOMER_SALT}
